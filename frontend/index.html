<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSV Agent</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        type="button"
        aria-label="Close sidebar"
        title="Close sidebar"
      >
        <span class="sidebar-toggle-icon">←</span>
      </button>
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>CSV Agent</h1>
            <p>Ask questions about the dataset, then keep going with follow-ups.</p>
          </div>
        </div>

        <section class="panel">
          <label class="field-label" for="dataset-select">Dataset</label>
          <div class="dataset-row">
            <div class="dataset-select-wrap">
              <div id="dataset-select-display" class="dataset-select-display"></div>
              <select id="dataset-select"></select>
            </div>
            <div class="dataset-actions">
              <button id="dataset-menu-button" class="dataset-menu-button" type="button" title="Dataset actions" aria-label="Dataset actions">⋯</button>
              <div id="dataset-menu" class="dataset-menu">
                <button id="delete-dataset-button" class="dataset-menu-item danger" type="button">Delete CSV</button>
              </div>
            </div>
          </div>
          <div class="upload-row">
            <label class="upload-label" for="upload-input">Choose CSV</label>
            <input id="upload-input" class="upload-input" type="file" accept=".csv,text/csv">
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Sessions</h2>
            <button id="new-session-button" class="new-session-button" type="button">New</button>
          </div>
          <div id="session-list" class="history-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <section id="chat-log" class="chat-log"></section>

        <form id="composer" class="composer">
          <div class="composer-input-wrap">
            <textarea
              id="question-input"
              rows="3"
              placeholder="Ask about trends, comparisons, summaries, or follow-ups..."
            ></textarea>
            <button id="send-button" class="send-inside" type="submit">Send</button>
          </div>
        </form>
      </main>
    </div>

    <template id="message-template">
      <article class="message">
        <div class="message-role"></div>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
